version: 2

# ---------------------------------------------------------------------------
# Marts layer – star schema
# All models are materialised as tables in NUAAV_DW.MARTS.
# ---------------------------------------------------------------------------
models:

  - name: dim_client
    description: >
      Client / data-provider dimension.  Seeded with three rows (A, B, C).
      Client B has no data yet (is_active = FALSE).  Client C source folder
      was delivered under the name "Client B" – that is a delivery artefact
      captured in the SOURCE_FOLDER column.
    columns:
      - name: client_key
        description: Surrogate key (dbt_utils.generate_surrogate_key)
        tests: [unique, not_null]
      - name: client_id
        tests: [unique, not_null]

  - name: dim_customer
    description: >
      Unified customer dimension across all active clients.
      One row per (customer_id, client_key) combination.
    columns:
      - name: customer_key
        tests: [unique, not_null]
      - name: customer_id
        tests: [not_null]
      - name: client_key
        tests: [not_null, relationships: {to: ref('dim_client'), field: client_key}]
      - name: loyalty_tier
        tests:
          - accepted_values:
              values: ['PLATINUM', 'GOLD', 'SILVER', 'BRONZE', 'UNKNOWN']

  - name: dim_product
    description: >
      Unified product / SKU catalogue across all clients.
      Rows with is_price_valid = FALSE have a negative or zero unit_price
      in the source and must not be used for revenue calculations.
    columns:
      - name: product_key
        tests: [unique, not_null]
      - name: sku
        tests: [not_null]
      - name: client_key
        tests: [not_null, relationships: {to: ref('dim_client'), field: client_key}]

  - name: dim_date
    description: >
      Date spine covering the full range of order/transaction dates present
      in the data (plus a configurable buffer).  Generated by a dbt macro.
    columns:
      - name: date_key
        tests: [unique, not_null]
      - name: full_date
        tests: [unique]

  - name: dim_payment_type
    description: Lookup table for payment methods observed across all clients.
    columns:
      - name: payment_type_key
        tests: [unique, not_null]
      - name: payment_method
        tests: [unique, not_null]

  - name: fact_transactions
    description: >
      Central fact table at transaction line-item grain (one row per transaction).
      Aggregates line items by transaction ID.
      Rows with anomaly flags set to TRUE should be excluded from standard metrics.
    columns:
      - name: transaction_id
        tests: [unique, not_null]
      - name: order_id
        tests: [relationships: {to: ref('fact_orders'), field: order_id}]
      - name: client_key
        tests: [not_null, relationships: {to: ref('dim_client'), field: client_key}]
      - name: customer_key
        tests: [relationships: {to: ref('dim_customer'), field: customer_key}]
      - name: date_key
        tests: [relationships: {to: ref('dim_date'), field: date_key}]
      - name: payment_type_key
        tests: [relationships: {to: ref('dim_payment_type'), field: payment_type_key}]

  - name: fact_orders
    description: >
      Line-item fact table at item grain (one row per item in an order).
      Each row represents one SKU within one order.
      Multiple rows can share the same order_id (multiple items per order).
      Rows with anomaly flags set to TRUE should be excluded from standard metrics.
    columns:
      - name: transaction_id
        tests: [not_null]
      - name: order_id
        tests: []
      - name: client_key
        tests: [not_null, relationships: {to: ref('dim_client'), field: client_key}]
      - name: customer_key
        tests: [relationships: {to: ref('dim_customer'), field: customer_key}]
      - name: product_key
        tests: [relationships: {to: ref('dim_product'), field: product_key}]
      - name: date_key
        tests: [relationships: {to: ref('dim_date'), field: date_key}]
      - name: payment_type_key
        tests: [relationships: {to: ref('dim_payment_type'), field: payment_type_key}]
