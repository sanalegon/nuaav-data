version: 2

# ---------------------------------------------------------------------------
# Marts layer – star schema
# All models are materialised as tables in NUAAV_DW.MARTS.
# ---------------------------------------------------------------------------
models:

  - name: dim_client
    description: >
      Client / data-provider dimension.  Seeded with three rows (A, B, C).
      Client B has no data yet (is_active = FALSE).  Client C source folder
      was delivered under the name "Client B" – that is a delivery artefact
      captured in the SOURCE_FOLDER column.
    columns:
      - name: client_key
        description: Surrogate key (dbt_utils.generate_surrogate_key)
        tests: [unique, not_null]
      - name: client_id
        tests: [unique, not_null]

  - name: dim_customer
    description: >
      Unified customer dimension across all active clients.
      One row per (customer_id, client_key) combination.
    columns:
      - name: customer_key
        tests: [unique, not_null]
      - name: customer_id
        tests: [not_null]
      - name: client_key
        tests: [not_null, relationships: {to: ref('dim_client'), field: client_key}]
      - name: loyalty_tier
        tests:
          - accepted_values:
              values: ['PLATINUM', 'GOLD', 'SILVER', 'BRONZE', 'UNKNOWN']

  - name: dim_product
    description: >
      Unified product / SKU catalogue across all clients.
      Rows with is_price_valid = FALSE have a negative or zero unit_price
      in the source and must not be used for revenue calculations.
    columns:
      - name: product_key
        tests: [unique, not_null]
      - name: sku
        tests: [not_null]
      - name: client_key
        tests: [not_null, relationships: {to: ref('dim_client'), field: client_key}]

  - name: dim_date
    description: >
      Date spine covering the full range of order/transaction dates present
      in the data (plus a configurable buffer).  Generated by a dbt macro.
    columns:
      - name: date_key
        tests: [unique, not_null]
      - name: full_date
        tests: [unique, not_null]

  - name: dim_payment_type
    description: Lookup table for payment methods observed across all clients.
    columns:
      - name: payment_type_key
        tests: [unique, not_null]
      - name: payment_method
        tests: [unique, not_null]

  - name: fact_transactions
    description: >
      Central fact table at transaction line-item grain.
      Each row represents one SKU within one transaction.
      **IMPORTANT**: Every transaction must belong to an order.
      fact_transactions.ORDER_ID is a NOT NULL foreign key to fact_orders.ORDER_ID,
      enforcing 1:N relationship and ensuring referential integrity.
      Rows with any anomaly flag set to TRUE should be excluded from standard revenue / volume metrics.
    columns:
      - name: transaction_key
        tests: [unique, not_null]
      - name: order_id
        tests: [not_null, relationships: {to: ref('fact_orders'), field: order_id}]
      - name: client_key
        tests: [not_null, relationships: {to: ref('dim_client'), field: client_key}]
      - name: customer_key
        tests: [relationships: {to: ref('dim_customer'), field: customer_key}]
      - name: product_key
        tests: [relationships: {to: ref('dim_product'), field: product_key}]
      - name: date_key
        tests: [relationships: {to: ref('dim_date'), field: date_key}]
      - name: payment_type_key
        tests: [relationships: {to: ref('dim_payment_type'), field: payment_type_key}]

  - name: fact_orders
    description: >
      Order-level fact table at order grain.
      Each row represents one order (order-header summary).
      **IMPORTANT**: This table must be materialized BEFORE fact_transactions
      as it is referenced by the fact_transactions foreign key (ORDER_ID).
      dbt resolves this dependency automatically.
      Rows with any anomaly flag set to TRUE should be excluded from
      standard order volume and AOV metrics.
    columns:
      - name: order_key
        tests: [unique, not_null]
      - name: order_id
        tests: [not_null]
      - name: client_key
        tests: [not_null, relationships: {to: ref('dim_client'), field: client_key}]
      - name: customer_key
        tests: [relationships: {to: ref('dim_customer'), field: customer_key}]
      - name: date_key
        tests: [relationships: {to: ref('dim_date'), field: date_key}]
      - name: payment_type_key
        tests: [relationships: {to: ref('dim_payment_type'), field: payment_type_key}]
